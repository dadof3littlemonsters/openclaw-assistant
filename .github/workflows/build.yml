name: Build APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17
      - uses: android-actions/setup-android@v3
      - name: Find package name
        run: grep -r "applicationId" app/build.gradle* || grep -r "namespace" app/build.gradle*
      - name: Create dummy google-services.json
        run: |
          PKGNAME=$(grep -oP 'applicationId\s*=?\s*"?\K[^"]+' app/build.gradle.kts app/build.gradle 2>/dev/null | head -1)
          [ -z "$PKGNAME" ] && PKGNAME="com.yuga.openclawassistant"
          echo "Using package: $PKGNAME"
          cat > app/google-services.json << EOF
          {
            "project_info": {
              "project_number": "000000000000",
              "project_id": "dummy",
              "storage_bucket": "dummy.appspot.com"
            },
            "client": [{
              "client_info": {
                "mobilesdk_app_id": "1:000000000000:android:0000000000000000",
                "android_client_info": { "package_name": "$PKGNAME" }
              },
              "api_key": [{ "current_key": "dummy" }]
            }],
            "configuration_version": "1"
          }
          EOF
      - name: Build
        run: ./gradlew assembleStandardDebug
      - uses: actions/upload-artifact@v4
        with:
          name: wakehermesclaw-debug
          path: app/build/outputs/apk/**/debug/*.apk
